name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools cmdline-tools;latest'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Capacitor Android platform
        working-directory: apps/web
        run: pnpm add @capacitor/android

      - name: Build web app
        working-directory: apps/web
        run: npx vite build

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: apps/web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/web/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
        run: ./gradlew assembleDebug

      - name: Find APK files
        run: find apps/web/android -name "*.apk" -type f 2>/dev/null || echo "no apk found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-recorder-debug
          path: apps/web/android/app/build/outputs/apk/**/*.apk
